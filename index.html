<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Clock - Multiple Time Zones</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>🌍 World Clock</h1>
        <p class="subtitle">Current time in different time zones</p>
        
        <div class="controls">
            <input type="text" id="timezoneInput" placeholder="Add timezone (e.g., America/New_York, Europe/London, Asia/Tokyo)">
            <button id="addBtn">Add Timezone</button>
            <button id="resetBtn">Reset to Default</button>
        </div>

        <div class="clocks-container" id="clocksContainer">
            <!-- Clocks will be dynamically added here -->
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
